services:
  # Analytics API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobrythm_api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8082/_health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      PORT: 8082
      DATA_DIR: /data
    volumes:
      - api_data:/data
    networks:
      - jobrythm_network

  # Frontend (React + nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass VITE_API_URL at build time so the compiled JS uses the right base.
        # Leave empty to use relative URLs proxied through nginx.
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: jobrythm_frontend
    restart: unless-stopped
    ports:
      - "8081:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - jobrythm_network

volumes:
  api_data:
    driver: local

networks:
  jobrythm_network:
    driver: bridge
